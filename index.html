<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Rush Viral</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

canvas{
  display:block;
  margin:10px auto;
  background:#e6f7ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

#hud{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  text-align:center;
  font-weight:bold;
}

.bar{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(to right,gold,orange);
}

/* SHARE BUTTON */
#shareBtn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:#4caf50;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="hud">
  🪙 <span id="gold">0</span> | 💰 ₱<span id="money">0.00</span><br>
  🏆 Best: <span id="best">0</span>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<canvas id="game" width="360" height="520"></canvas>

<button id="shareBtn">📸 Share Score</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ULTRA EASY SETTINGS
const GRAVITY = 0.25;
const JUMP = -5.5;
const SPEED = 1.2;

let player, obstacles, gold, combo, started, over;
let particles = [];
let best = localStorage.getItem("best") || 0;

document.getElementById("best").innerText = best;

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  gold = 0;
  combo = 1;
  started = false;
  over = false;
  particles = [];
}
reset();

// SPAWN (VERY EASY)
setInterval(()=>{
  if(!started || over) return;

  let gap = 230;
  let top = Math.random()*120 + 100;

  obstacles.push({
    x:360,
    w:45,
    top:top,
    bottom:520-(top+gap),
    passed:false
  });
},1800);

// PARTICLES
function addParticles(x,y){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-1)*2,
      life:25
    });
  }
}

// LOOP
function update(){
  ctx.clearRect(0,0,360,520);

  ctx.font="18px Arial";
  ctx.fillStyle="#222";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    ctx.fillText("Gold: "+gold,130,300);

    // SAVE BEST
    if(gold > best){
      best = gold;
      localStorage.setItem("best",best);
      document.getElementById("best").innerText = best;
    }

    requestAnimationFrame(update);
    return;
  }

  // PLAYER
  player.v += GRAVITY;
  player.y += player.v;

  ctx.fillStyle="#0077ff";
  ctx.fillRect(player.x,player.y,16,22);

  // OBSTACLES
  obstacles.forEach(o=>{
    o.x -= SPEED;

    ctx.fillStyle="#6b3e26";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,520-o.bottom,o.w,o.bottom);

    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top || player.y+22 > 520-o.bottom)){
        over = true;
    }

    if(!o.passed && o.x+o.w < player.x){
      o.passed = true;

      combo++;
      let gain = combo;
      gold += gain;

      addParticles(player.x,player.y);
    }
  });

  if(player.y > 520){
    over = true;
  }

  // PARTICLES
  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle="gold";
    ctx.fillRect(p.x,p.y,4,4);
  });
  particles = particles.filter(p=>p.life>0);

  // UI
  document.getElementById("gold").innerText = gold;

  let money = gold * 0.05;
  document.getElementById("money").innerText = money.toFixed(2);

  let percent = (gold % 20)/20*100;
  document.getElementById("fill").style.width = percent+"%";

  ctx.fillStyle="orange";
  ctx.fillText("x"+combo,160,60);

  requestAnimationFrame(update);
}

// TAP
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// SHARE BUTTON
document.getElementById("shareBtn").onclick = ()=>{
  let money = (gold*0.05).toFixed(2);

  let text = "I earned ₱"+money+" in this game! Can you beat me?";

  if(navigator.share){
    navigator.share({text});
  }else{
    navigator.clipboard.writeText(text);
    alert("Copied! Share it 🔥");
  }
};

update();
</script>

</body>
</html>
