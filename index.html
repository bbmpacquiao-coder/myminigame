<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Rush Earn</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

canvas{
  display:block;
  margin:10px auto;
  background:#e6f7ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

#hud{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  text-align:center;
  font-weight:bold;
}

.bar{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(to right,gold,orange);
}

/* BUTTONS */
#boostBtn, #shareBtn{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  border:none;
  border-radius:20px;
  color:white;
  font-weight:bold;
}

#boostBtn{
  bottom:70px;
  background:#ff9800;
}

#shareBtn{
  bottom:20px;
  background:#4caf50;
}

/* POPUP */
#popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:300px;
  text-align:center;
}

.btn{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
}

.paypal{background:#0070ba;color:white;}
.copy{background:#333;color:white;}
.unlock{background:#4caf50;color:white;}
.close{background:#ccc;}
</style>
</head>

<body>

<div id="hud">
  🪙 <span id="gold">0</span> | 💰 ₱<span id="money">0.00</span><br>
  🏆 Best: <span id="best">0</span>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<canvas id="game" width="360" height="520"></canvas>

<button id="boostBtn">🚀 Unlock 2X Boost</button>
<button id="shareBtn">📸 Share</button>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <h3>💸 Support & Unlock BOOST</h3>

    <button class="btn paypal" onclick="pay()">PayPal</button>

    <p>Maya</p>
    <div>Morris Zoleta</div>
    <button class="btn copy" onclick="copyName()">Copy Name</button>

    <div>09289652830</div>
    <button class="btn copy" onclick="copyNum()">Copy Number</button>

    <button class="btn unlock" onclick="unlock()">I Supported</button>
    <button class="btn close" onclick="closePop()">Close</button>
  </div>
</div>

<script>
// ===== SOUND SYSTEM =====
let audioCtx;

function initSound(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(freq, duration){
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRAVITY = 0.25;
const JUMP = -5.5;
const SPEED = 1.2;

let player, obstacles, gold, combo, started, over;
let particles = [];
let best = localStorage.getItem("best") || 0;
let boost = false;

document.getElementById("best").innerText = best;

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  gold = 0;
  combo = 1;
  started = false;
  over = false;
  particles = [];
}
reset();

// SPAWN
setInterval(()=>{
  if(!started || over) return;

  let gap = 230;
  let top = Math.random()*120 + 100;

  obstacles.push({
    x:360,
    w:45,
    top:top,
    bottom:520-(top+gap),
    passed:false
  });
},1800);

// PARTICLES
function addParticles(x,y){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-1)*2,
      life:25
    });
  }
}

// LOOP
function update(){
  ctx.clearRect(0,0,360,520);

  ctx.font="18px Arial";
  ctx.fillStyle="#222";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    ctx.fillText("Gold: "+gold,130,300);

    if(gold > best){
      best = gold;
      localStorage.setItem("best",best);
      document.getElementById("best").innerText = best;
    }

    requestAnimationFrame(update);
    return;
  }

  player.v += GRAVITY;
  player.y += player.v;

  ctx.fillStyle="#0077ff";
  ctx.fillRect(player.x,player.y,16,22);

  obstacles.forEach(o=>{
    o.x -= SPEED;

    ctx.fillStyle="#6b3e26";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,520-o.bottom,o.w,o.bottom);

    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top || player.y+22 > 520-o.bottom)){
        if(!over){
          over = true;
          playSound(120,0.4); // game over sound
        }
    }

    if(!o.passed && o.x+o.w < player.x){
      o.passed = true;

      combo++;
      let gain = boost ? combo*2 : combo;
      gold += gain;

      addParticles(player.x,player.y);
      playSound(600,0.1); // coin sound
    }
  });

  if(player.y > 520){
    over = true;
    playSound(120,0.4);
  }

  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle="gold";
    ctx.fillRect(p.x,p.y,4,4);
  });
  particles = particles.filter(p=>p.life>0);

  document.getElementById("gold").innerText = gold;

  let money = gold * 0.05;
  document.getElementById("money").innerText = money.toFixed(2);

  let percent = (gold % 20)/20*100;
  document.getElementById("fill").style.width = percent+"%";

  ctx.fillStyle="orange";
  ctx.fillText("x"+combo,160,60);

  requestAnimationFrame(update);
}

// TAP
function tap(){
  initSound();

  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
  playSound(300,0.1); // jump sound
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

// BOOST BUTTON
document.getElementById("boostBtn").onclick = ()=>{
  if(!boost){
    document.getElementById("popup").style.display="flex";
  }
};

// DONATION
function pay(){
  window.location.href="https://www.paypal.me/MorrisZoleta982";
}

function copyName(){
  navigator.clipboard.writeText("Morris Zoleta");
  alert("Copied name");
}

function copyNum(){
  navigator.clipboard.writeText("09289652830");
  alert("Copied number");
}

function unlock(){
  boost = true;
  document.getElementById("popup").style.display="none";
  document.getElementById("boostBtn").innerText="🔥 BOOST ACTIVE";
  document.getElementById("boostBtn").style.background="green";
}

function closePop(){
  document.getElementById("popup").style.display="none";
}

// SHARE
document.getElementById("shareBtn").onclick = ()=>{
  let money = (gold*0.05).toFixed(2);
  let text = "I earned ₱"+money+"! Try this game!";

  if(navigator.share){
    navigator.share({text});
  }else{
    navigator.clipboard.writeText(text);
    alert("Copied! Share it 🔥");
  }
};

update();
</script>

</body>
</html>
