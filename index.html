<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Rush</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

canvas{
  display:block;
  margin:10px auto;
  background:#e6f7ff;
  border-radius:20px;
  width:92vw;
  max-width:360px;
}

/* HUD */
#hud{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  text-align:center;
  font-weight:bold;
  color:#222;
}

.bar{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(to right,gold,orange);
  transition:0.2s;
}
</style>
</head>

<body>

<div id="hud">
  🪙 <span id="gold">0</span> | 💰 ₱<span id="money">0.00</span>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<canvas id="game" width="360" height="520"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRAVITY = 0.35;
const JUMP = -6.5;
const SPEED = 1.6;

let player, obstacles, gold, started, over, combo;
let particles = [];

function reset(){
  player = { x:70, y:220, v:0 };
  obstacles = [];
  gold = 0;
  combo = 1;
  started = false;
  over = false;
  particles = [];
}
reset();

// spawn
setInterval(()=>{
  if(!started || over) return;

  let gap = 200;
  let top = Math.random()*150 + 80;

  obstacles.push({
    x:360,
    w:45,
    top:top,
    bottom:520-(top+gap),
    passed:false
  });
},1600);

// particles
function addParticles(x,y){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*3,
      vy:(Math.random()-1.5)*3,
      life:30
    });
  }
}

// loop
function update(){
  ctx.clearRect(0,0,360,520);

  ctx.font="18px Arial";
  ctx.fillStyle="#222";

  if(!started){
    ctx.fillText("Tap to Start",110,260);
    requestAnimationFrame(update);
    return;
  }

  if(over){
    ctx.fillText("Game Over",120,240);
    ctx.fillText("Tap to Restart",95,270);
    ctx.fillText("Gold: "+gold,130,300);
    requestAnimationFrame(update);
    return;
  }

  // player
  player.v += GRAVITY;
  player.y += player.v;

  ctx.fillStyle="#0077ff";
  ctx.fillRect(player.x,player.y,16,22);

  // obstacles
  obstacles.forEach(o=>{
    o.x -= SPEED;

    ctx.fillStyle="#6b3e26";
    ctx.fillRect(o.x,0,o.w,o.top);
    ctx.fillRect(o.x,520-o.bottom,o.w,o.bottom);

    if(player.x < o.x+o.w && player.x+16 > o.x &&
      (player.y < o.top || player.y+22 > 520-o.bottom)){
        over = true;
    }

    if(!o.passed && o.x+o.w < player.x){
      o.passed = true;

      combo++;
      let gain = combo;
      gold += gain;

      addParticles(player.x,player.y);
    }
  });

  if(player.y > 520){
    over = true;
  }

  // particles
  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle="gold";
    ctx.fillRect(p.x,p.y,4,4);
  });
  particles = particles.filter(p=>p.life>0);

  // UI
  document.getElementById("gold").innerText = gold;

  let money = gold * 0.05;
  document.getElementById("money").innerText = money.toFixed(2);

  let percent = (gold % 20)/20*100;
  document.getElementById("fill").style.width = percent+"%";

  // combo text
  ctx.fillStyle="orange";
  ctx.fillText("x"+combo,160,60);

  requestAnimationFrame(update);
}

// tap
function tap(){
  if(!started){
    started = true;
    return;
  }

  if(over){
    reset();
    return;
  }

  player.v = JUMP;
}

canvas.addEventListener("click", tap);
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  tap();
},{passive:false});

update();
</script>

</body>
</html>
